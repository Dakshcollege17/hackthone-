<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Form</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <h2>User Profile</h2>

        <form id="profileForm">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">

            <label>Gender</label>
            <select id="gender">
                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label>Skills</label>
            <div class="checkbox-group">
                <label><input type="checkbox" value="JavaScript"> JavaScript</label>
                <label><input type="checkbox" value="React"> React</label>
                <label><input type="checkbox" value="Node"> Node</label>
            </div>

            <label>About You</label>
            <textarea id="about" placeholder="Write something..."></textarea>

            <button type="submit">Submit</button>
        </form>

        <div id="output"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
